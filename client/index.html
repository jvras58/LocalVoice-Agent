<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>LocalVoice</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif;
      background: #0f1220; color: #e7e9f2;
      display: flex; flex-direction: column;
    }
    header { padding: 16px; text-align: center; border-bottom: 1px solid #232743; }
    header h1 { margin: 0; font-size: 1.15rem; letter-spacing: .5px; }
    #status { font-size: .8rem; margin-top: 6px; color: #8b90a8; }
    #status.on { color: #4ade80; }
    #status.off { color: #f87171; }
    main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; line-height: 1.35; font-size: .95rem; }
    .user { align-self: flex-end; background: #2563eb; border-bottom-right-radius: 4px; }
    .agent { align-self: flex-start; background: #232743; border-bottom-left-radius: 4px; }
    .sys { align-self: center; color: #8b90a8; font-size: .8rem; text-align: center; }
    footer { padding: 18px; border-top: 1px solid #232743; display: flex; justify-content: center; }
    #mic {
      width: 76px; height: 76px; border-radius: 50%; border: none; cursor: pointer;
      background: #2563eb; color: #fff; font-size: 1.7rem; transition: transform .1s, background .2s;
    }
    #mic:active { transform: scale(.94); }
    #mic.listening { background: #ef4444; animation: pulse 1.2s infinite; }
    #mic:disabled { background: #3a3f5c; cursor: not-allowed; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); } 50% { box-shadow: 0 0 0 14px rgba(239,68,68,0); } }
  </style>
</head>
<body>
  <header>
    <h1>🎙️ LocalVoice</h1>
    <div id="status" class="off">desconectado</div>
  </header>
  <main id="log"></main>
  <footer>
    <button id="mic" title="Toque para falar">🎤</button>
  </footer>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const micBtn = document.getElementById("mic");

    function makeSessionId() {
      if (window.crypto && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }
      // crypto.randomUUID só existe em contexto seguro (HTTPS/localhost).
      return "sess-" + Math.random().toString(36).slice(2) + "-" + Date.now().toString(36);
    }

    const sessionId = makeSessionId();
    const wsProto = location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${wsProto}://${location.host}/ws/${sessionId}`;

    let socket = null;
    let audioCtx = null;
    let listening = false;

    function addMessage(text, kind) {
      const div = document.createElement("div");
      div.className = `msg ${kind}`;
      div.textContent = text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, on) {
      statusEl.textContent = text;
      statusEl.className = on ? "on" : "off";
    }

    function connect() {
      socket = new WebSocket(wsUrl);
      socket.onopen = () => setStatus("conectado", true);
      socket.onclose = () => { setStatus("reconectando…", false); setTimeout(connect, 1500); };
      socket.onerror = () => setStatus("erro de conexão", false);
      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.reply_text) addMessage(data.reply_text, "agent");
        if (data.audio_buffer_b64) playWavBase64(data.audio_buffer_b64);
      };
    }

    function base64ToArrayBuffer(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    async function playWavBase64(b64) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") await audioCtx.resume();
      const buffer = await audioCtx.decodeAudioData(base64ToArrayBuffer(b64));
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);
      source.start();
    }

    // --- STT via Web Speech API ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "pt-BR";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => { listening = true; micBtn.classList.add("listening"); };
      recognition.onend = () => { listening = false; micBtn.classList.remove("listening"); };
      recognition.onerror = (e) => addMessage(`STT: ${e.error}`, "sys");
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.trim();
        if (!transcript) return;
        addMessage(transcript, "user");
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ text: transcript }));
        } else {
          addMessage("Sem conexão com o servidor.", "sys");
        }
      };
    } else {
      micBtn.disabled = true;
      addMessage("Este navegador não suporta reconhecimento de voz (Web Speech API).", "sys");
    }

    micBtn.addEventListener("click", async () => {
      if (!recognition) return;
      // Garante o AudioContext liberado pelo gesto do usuário (mobile).
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") await audioCtx.resume();
      if (listening) recognition.stop();
      else recognition.start();
    });

    if (!window.isSecureContext) {
      addMessage(
        "Conectado, mas o microfone (STT) exige contexto seguro: use " +
        "http://localhost:8000 no PC, ou um túnel HTTPS no celular. " +
        "Por http://IP-da-rede o navegador bloqueia o reconhecimento de voz.",
        "sys"
      );
    }

    connect();
  </script>
</body>
</html>
